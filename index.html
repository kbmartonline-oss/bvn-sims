    const { useState, useEffect, useCallback } = React;
    const fbSaveSchools    = (data) => db.collection("config").doc("schools").set({ list: data });
    const fbSaveSchoolData = (id, data) => db.collection("schoolData").doc(String(id)).set(data);
    const fbDeleteSchoolData = (id) => db.collection("schoolData").doc(String(id)).delete();
    const fbSaveSubjects   = (data) => db.collection("config").doc("subjects").set({ list: data });
    const fbSaveUsers       = (data) => db.collection("config").doc("users").set({ list: data });

    function useFirebase(initialSchools, initialData, initialUsers) {
      const [schools, setSchools]       = useState(initialSchools);
      const [schoolData, setSchoolData] = useState(initialData);
      const [subjects, setSubjects]     = useState(DEFAULT_SUBJECTS);
      const [users, setUsers]           = useState(initialUsers);
      const [ready, setReady]           = useState(false);
      useEffect(() => {
        Promise.all([
          db.collection("config").doc("schools").get(),
          db.collection("config").doc("subjects").get(),
          db.collection("config").doc("users").get(),
          db.collection("schoolData").get()
        ]).then(([schoolsSnap, subSnap, usersSnap, dataSnap]) => {
          if (schoolsSnap.exists && schoolsSnap.data().list?.length)
            setSchools(schoolsSnap.data().list);
          if (subSnap.exists && subSnap.data().list?.length)
            setSubjects(subSnap.data().list);
          if (usersSnap.exists && usersSnap.data().list?.length)
            setUsers(usersSnap.data().list);
          if (!dataSnap.empty) {
            const loaded = {};
            dataSnap.forEach(doc => { loaded[doc.id] = doc.data(); });
            setSchoolData(prev => ({ ...prev, ...loaded }));
          }
          setReady(true);
          document.getElementById("fb-loading").style.display = "none";
        }).catch(() => {
          setReady(true);
          document.getElementById("fb-loading").style.display = "none";
        });
      }, []);
      return { schools, setSchools, schoolData, setSchoolData, subjects, setSubjects, users, setUsers, ready };
    }

  }
  @media (min-width: 769px) {
    .mobile-overlay { display: none; }

  /* ── District banner ── */
  .district-banner { background: linear-gradient(135deg, ${COLORS.navBg} 0%, #2C4A70 100%); color: #fff; padding: 20px 28px; display: flex; align-items: center; gap: 16px; }

// ─── App Component ────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [schools, setSchools] = useState(INITIAL_SCHOOLS);
  const [schoolData, setSchoolData] = useState(INITIAL_SCHOOL_DATA);
  const [page, setPage] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [selectedSchoolId, setSelectedSchoolId] = useState(null);
  const [dataTab, setDataTab] = useState("strength");
  const [subjects, setSubjects] = useState(DEFAULT_SUBJECTS);
  const [users, setUsers] = useState(USERS);

  const login = (username, password) => {
    const u = users.find(x => x.username === username && x.password === password);
    if (u) { setUser(u); setPage("dashboard"); return true; }
    return false;
  };

  const updateUserPassword = (userId, newPassword) => {
    setUsers(prev => prev.map(u => u.id === userId ? { ...u, password: newPassword } : u));
  };

  const logout = () => { setUser(null); setPage("dashboard"); };

  const updateSchoolProfile = (id, updates) => {
    setSchools(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s));
  };

  const updateData = (schoolId, field, value) => {
    setSchoolData(prev => ({
      ...prev,
      [schoolId]: { ...prev[schoolId], [field]: value }
    }));
  };

  const submitData = (schoolId) => {
    setSchoolData(prev => ({
      ...prev,
      [schoolId]: { ...prev[schoolId], status: "submitted", submittedAt: new Date().toISOString() }
    }));
  };

  const approveData = (schoolId) => {
    setSchoolData(prev => ({
      ...prev,
      [schoolId]: { ...prev[schoolId], status: "approved" }
    }));
  };

  const lockData = (schoolId) => {
    setSchoolData(prev => ({
      ...prev,
      [schoolId]: { ...prev[schoolId], status: "locked", lockedAt: new Date().toISOString() }
    }));
  };

  const unlockData = (schoolId) => {
    setSchoolData(prev => ({
      ...prev,
      [schoolId]: { ...prev[schoolId], status: "approved", lockedAt: null }
    }));
  };

  const addSchool = (school) => {
    const id = schools.length + 1;
    setSchools(prev => [...prev, { ...school, id }]);
    setSchoolData(prev => ({ ...prev, [id]: makeSchoolData(id) }));
  };

  const deleteSchool = (id) => {
    if (!window.confirm("ഈ സ്കൂൾ നീക്കം ചെയ്യണോ?")) return;
    setSchools(prev => prev.filter(s => s.id !== id));
    setSchoolData(prev => { const n = { ...prev }; delete n[id]; return n; });
  };

  if (!user) return <LoginScreen onLogin={login} />;

  const mySchoolId = user.role === "school" ? user.schoolId : (selectedSchoolId || schools[0]?.id);
  const mySchool = schools.find(s => s.id === mySchoolId);
  const myData = schoolData[mySchoolId] || makeSchoolData(mySchoolId);
  const isLocked = myData.status === "locked";

  return (
    <>
      <style dangerouslySetInnerHTML={{ __html: css }} />
      <div className="app-shell">
        <Sidebar user={user} page={page} setPage={setPage} sidebarOpen={sidebarOpen} onLogout={logout} onToggle={() => setSidebarOpen(o => !o)} />
        <div className={`main-content ${sidebarOpen ? "" : "full"}`}>
          <div className="district-banner">
            <span className="banner-om">ॐ</span>
            <div className="banner-text">
              <h2>Bharatheeya Vidya Niketan – Kollam District</h2>
              <p>School Information Management System</p>
            </div>
            <span className="banner-year">2026–27</span>
          </div>
          <Topbar title={pageTitle(page)} onToggle={() => setSidebarOpen(o => !o)} user={user} />
          <div className="page">
            {page === "dashboard" && (
              user.role === "admin"
                ? <AdminDashboard schools={schools} schoolData={schoolData} />
                : <SchoolDashboard school={mySchool} data={myData} />
            )}
            {page === "schools" && user.role === "admin" && (
              <SchoolsPage schools={schools} schoolData={schoolData}
                onSelect={(id) => { setSelectedSchoolId(id); setPage("data-entry"); }}
                onAdd={addSchool}
                onDelete={deleteSchool}
                onApprove={approveData} onLock={lockData} onUnlock={unlockData}
              />
            )}
            {/* School users blocked from district pages */}
            {page === "schools" && user.role === "school" && (
              <div className="alert alert-danger">🚫 ഈ പേജ് കാണാൻ അനുമതിയില്ല.</div>
            )}
            {page === "users" && user.role === "school" && (
              <div className="alert alert-danger">🚫 ഈ പേജ് കാണാൻ അനുമതിയില്ല.</div>
            )}
            {page === "profile" && (
              <ProfilePage school={mySchool} onSave={(u) => updateSchoolProfile(mySchoolId, u)} readOnly={user.role === "school" ? isLocked : false} />
            )}
            {page === "data-entry" && (
              <DataEntryPage
                school={mySchool} data={myData}
                onUpdate={(f, v) => updateData(mySchoolId, f, v)}
                onSubmit={() => submitData(mySchoolId)}
                locked={isLocked}
                tab={dataTab} setTab={setDataTab}
              />
            )}
            {page === "reports" && (
              <ReportsPage
                schools={user.role === "school" ? schools.filter(s => s.id === user.schoolId) : schools}
                schoolData={schoolData}
                selectedId={user.role === "school" ? user.schoolId : null}
                isSchoolUser={user.role === "school"}
              />
            )}
            {page === "users" && user.role === "admin" && (
              <UsersPage schools={schools} users={users} onUpdatePassword={updateUserPassword} />
            )}
            {page === "teachers" && user.role === "school" && (
              <TeachersPage data={myData} subjects={subjects}
                onUpdate={(f,v) => updateData(mySchoolId, f, v)} />
            )}
            {page === "samithi" && user.role === "school" && (
              <SamithiPage data={myData}
                onUpdate={(f,v) => updateData(mySchoolId, f, v)} />
            )}
            {page === "subjects" && user.role === "admin" && (
              <SubjectsPage subjects={subjects} onSave={(s) => setSubjects(s)} />
            )}
            {page === "teacher-reports" && user.role === "admin" && (
              <TeacherReportsPage schools={schools} schoolData={schoolData} subjects={subjects} />
            )}
          </div>
        </div>
      </div>
    </>
  );
}

// ─── Login ────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handle = async () => {
    setLoading(true);
    await new Promise(r => setTimeout(r, 400));
    if (!onLogin(username, password)) setError("Invalid username or password.");
    setLoading(false);
  };

  return (
    <>
      <style dangerouslySetInnerHTML={{ __html: css }} />
      <div className="login-screen">
        <div className="login-card">
          <div className="login-brand">
            <div className="login-om">🪔</div>
            <h1>Bharatheeya Vidya Niketan<br/>Kollam District</h1>
            <p>School Information Management System · 2026–27</p>
          </div>
          <div className="login-form">
            {error && <div className="alert alert-danger">⚠️ {error}</div>}
            <div className="form-group">
              <label>Username</label>
              <input className="form-control" value={username} onChange={e => { setUsername(e.target.value); setError(""); }} placeholder="admin or bvn001" />
            </div>
            <div className="form-group">
              <label>Password</label>
              <input type="password" className="form-control" value={password} onChange={e => { setPassword(e.target.value); setError(""); }} placeholder="••••••••" onKeyDown={e => e.key === "Enter" && handle()} />
            </div>
            <button className="btn btn-primary" style={{ width: "100%", justifyContent: "center", padding: "12px" }} onClick={handle} disabled={loading}>
              {loading ? "Signing in…" : "Sign In →"}
            </button>
            <div className="login-hint">
              <strong>Demo credentials:</strong><br/>
              Admin: <code>admin</code> / <code>admin123</code><br/>
              School: <code>bvn001</code> – <code>bvn009</code> / <code>school123</code>
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

function pageTitle(p) {
  const m = {
    dashboard: "Dashboard", schools: "Schools", profile: "School Profile",
    "data-entry": "Data Entry", reports: "Reports", users: "Users",
    teachers: "അധ്യാപകർ", samithi: "സമിതി അംഗങ്ങൾ",
    "teacher-reports": "Teacher Reports", subjects: "Subjects",
  };
  return m[p] || p;
}

// ─── Admin Dashboard ──────────────────────────────────────────────────────
function AdminDashboard({ schools, schoolData }) {
  const allData = Object.values(schoolData);
  const totalStudents = allData.reduce((s, d) => s + sumStrength(d.strength).total, 0);
  const totalBoys = allData.reduce((s, d) => s + sumStrength(d.strength).boys, 0);
  const totalGirls = allData.reduce((s, d) => s + sumStrength(d.strength).girls, 0);
  const totalTeachers = allData.reduce((s, d) => s + Number(d.staff.maleteachers || 0) + Number(d.staff.femaleteachers || 0), 0);
  const totalNT = allData.reduce((s, d) => s + Number(d.staff.officestaff || 0) + Number(d.staff.ayah || 0) + Number(d.staff.librarian || 0) + Number(d.staff.accountant || 0) + Number(d.staff.otherstaff || 0), 0);
  const totalAdmissions = allData.reduce((s, d) => {
    let t = 0; CLASSES.forEach(c => { t += Number(d.admissions[c]?.boys || 0) + Number(d.admissions[c]?.girls || 0); });
    return s + t;
  }, 0);
  const totalSC = allData.reduce((s, d) => s + Number(d.community.SC || 0), 0);
  const totalST = allData.reduce((s, d) => s + Number(d.community.ST || 0), 0);
  const totalOBC = allData.reduce((s, d) => s + Number(d.community.OBC || 0), 0);
  const totalOEC = allData.reduce((s, d) => s + Number(d.community.OEC || 0), 0);
  const totalGeneral = allData.reduce((s, d) => s + Number(d.community.General || 0), 0);

  const submitted = allData.filter(d => ["submitted","approved","locked"].includes(d.status)).length;

  const schoolStrengths = schools.map(s => ({ name: s.name.split(" ").slice(0, 3).join(" "), val: sumStrength(schoolData[s.id]?.strength || makeStudentStrength()).total }));
  const maxVal = Math.max(...schoolStrengths.map(x => x.val), 1);

  return (
    <>
      <div className="alert alert-info">
        📌 <strong>{submitted} of {schools.length} schools</strong> have submitted data for 2026–27.
      </div>

      {/* Local Body Summary Stats */}
      <LocalBodySummaryCards schools={schools} schoolData={schoolData} />

      <div className="stats-grid">
        <StatCard icon="🏫" color="orange" label="Total Schools" value={fmtNum(schools.length)} />
        <StatCard icon="👨‍🎓" color="blue" label="Total Students" value={fmtNum(totalStudents)} sub={`${fmtNum(totalBoys)} Boys · ${fmtNum(totalGirls)} Girls`} />
        <StatCard icon="👦" color="blue" label="Total Boys" value={fmtNum(totalBoys)} />
        <StatCard icon="👧" color="purple" label="Total Girls" value={fmtNum(totalGirls)} />
        <StatCard icon="👩‍🏫" color="green" label="Total Teachers" value={fmtNum(totalTeachers)} />
        <StatCard icon="👷" color="amber" label="Non-Teaching Staff" value={fmtNum(totalNT)} />
        <StatCard icon="🆕" color="orange" label="New Admissions" value={fmtNum(totalAdmissions)} />
        <StatCard icon="📋" color="green" label="SC Students" value={fmtNum(totalSC)} />
        <StatCard icon="🌿" color="green" label="ST Students" value={fmtNum(totalST)} />
        <StatCard icon="🔵" color="blue" label="OBC Students" value={fmtNum(totalOBC)} />
        <StatCard icon="🟡" color="amber" label="OEC Students" value={fmtNum(totalOEC)} />
        <StatCard icon="⚪" color="red" label="General Students" value={fmtNum(totalGeneral)} />
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-title"><span className="icon">📊</span>School-wise Student Strength</div>
          <div className="bar-chart">
            {schoolStrengths.map((s, i) => (
              <div className="bar-row" key={i}>
                <div className="bar-label" title={s.name}>{s.name}</div>
                <div className="bar-track">
                  <div className="bar-fill" style={{ width: `${(s.val / maxVal) * 100}%` }}>
                    {s.val > 0 && <span>{s.val}</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="card">
          <div className="card-title"><span className="icon">📝</span>Submission Status</div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>School</th><th>Status</th><th>Students</th></tr></thead>
              <tbody>
                {schools.map(s => {
                  const d = schoolData[s.id];
                  return (
                    <tr key={s.id}>
                      <td style={{ fontSize: 13 }}>{s.name.split(" ").slice(0, 4).join(" ")}</td>
                      <td><StatusBadge status={d?.status || "draft"} /></td>
                      <td><strong>{fmtNum(sumStrength(d?.strength || makeStudentStrength()).total)}</strong></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div style={{ marginTop: 20 }} className="card">
        <div className="card-title"><span className="icon">🏛️</span>Taluk-wise Summary</div>
        <TalukSummary schools={schools} schoolData={schoolData} />
      </div>
    </>
  );
}

function LocalBodySummaryCards({ schools, schoolData }) {
  const types = ["Grama Panchayat", "Municipality", "Corporation"];
  const summary = types.map(type => {
    const typeSchools = schools.filter(s => (s.localBodyType || "Grama Panchayat") === type);
    const uniqueBodies = [...new Set(typeSchools.map(s => s.localBody).filter(Boolean))];
    const students = typeSchools.reduce((a, s) => a + sumStrength(schoolData[s.id]?.strength || makeStudentStrength()).total, 0);
    const taluks = [...new Set(typeSchools.map(s => s.taluk).filter(Boolean))];
    return { type, count: typeSchools.length, bodies: uniqueBodies, students, taluks };
  });

  const icons = { "Grama Panchayat": "🌾", "Municipality": "🏘️", "Corporation": "🏙️" };
  const colors = { "Grama Panchayat": COLORS.secondary, "Municipality": "#1D4ED8", "Corporation": "#7C3AED" };
  const bgColors = { "Grama Panchayat": "rgba(26,107,58,0.08)", "Municipality": "rgba(29,78,216,0.08)", "Corporation": "rgba(124,58,237,0.08)" };

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16, marginBottom: 20 }}>
      {summary.map(s => (
        <div key={s.type} style={{ background: "#fff", border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 18, borderTop: `4px solid ${colors[s.type]}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <span style={{ fontSize: 24 }}>{icons[s.type]}</span>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, color: colors[s.type] }}>{s.type}</div>
              <div style={{ fontSize: 12, color: COLORS.textMuted }}>{s.bodies.length} local bodies · {s.count} schools</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 16, marginBottom: 10 }}>
            <div style={{ background: bgColors[s.type], borderRadius: 8, padding: "6px 12px", flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted }}>Schools</div>

              <div style={{ fontSize: 22, fontWeight: 700, color: colors[s.type] }}>{fmtNum(s.students)}</div>
            </div>

          {s.bodies.length > 0 && (
            <div style={{ fontSize: 12, color: COLORS.textMuted }}>

// ─── TalukSummary ─────────────────────────────────────────────────────────
function TalukSummary({ schools, schoolData }) {
  const taluks = {};
  schools.forEach(s => {
    const t = s.taluk || "Unknown";
    if (!taluks[t]) taluks[t] = { schools: 0, students: 0, boys: 0, girls: 0 };
    taluks[t].schools++;
    const st = sumStrength(schoolData[s.id]?.strength || makeStudentStrength());
    taluks[t].students += st.total;
    taluks[t].boys += st.boys;
    taluks[t].girls += st.girls;
  });
  return (
    <div className="table-wrap">
      <table>
        <thead><tr><th>Taluk</th><th>Schools</th><th>Boys</th><th>Girls</th><th>Total Students</th></tr></thead>
        <tbody>
          {Object.entries(taluks).map(([t, v]) => (
            <tr key={t}>
              <td><strong>{t}</strong></td>
              <td>{v.schools}</td>
              <td>{fmtNum(v.boys)}</td>
              <td>{fmtNum(v.girls)}</td>
              <td><strong>{fmtNum(v.students)}</strong></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ─── School Dashboard ─────────────────────────────────────────────────────
function SchoolDashboard({ school, data }) {
  if (!school) return <div className="alert alert-warning">⚠️ School not found.</div>;
  const st = sumStrength(data.strength);
  const totalTeachers = Number(data.staff.maleteachers || 0) + Number(data.staff.femaleteachers || 0);
  const prev = Number(data.prevYearTotal || 0);
  const diff = st.total - prev;
  const growthPct = prev > 0 ? ((diff / prev) * 100).toFixed(1) : 0;

  return (
    <>
      <div className="card" style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ width: 56, height: 56, borderRadius: 12, background: COLORS.primary, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>🏫</div>
          <div>
            <h2 style={{ fontSize: 18, fontWeight: 700 }}>{school.name}</h2>
            <p style={{ fontSize: 13, color: COLORS.textMuted }}>{school.code} · {school.level} · {school.place}</p>
          </div>
          <div style={{ marginLeft: "auto" }}><StatusBadge status={data.status} /></div>
        </div>
      </div>

      <div className="stats-grid">
        <StatCard icon="👨‍🎓" color="blue" label="Total Students" value={fmtNum(st.total)} sub={`${fmtNum(st.boys)} B · ${fmtNum(st.girls)} G`} />
        <StatCard icon="👩‍🏫" color="green" label="Total Teachers" value={fmtNum(totalTeachers)} />
        <StatCard icon="📈" color={diff >= 0 ? "green" : "red"} label="Growth vs Last Year" value={`${diff >= 0 ? "+" : ""}${fmtNum(diff)}`} sub={`${growthPct}% vs 2025-26`} />
        <StatCard icon="📝" color="orange" label="Submission Status" value={data.status.charAt(0).toUpperCase() + data.status.slice(1)} />
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-title">📊 Community Distribution</div>
          {["SC", "ST", "OBC", "OEC", "General"].map((c, i) => {
            const v = Number(data.community[c] || 0);
            const pct = st.total > 0 ? Math.round((v / st.total) * 100) : 0;
            const colors = ["orange","green","blue","amber","red"];

              <div className="bar-row" key={c} style={{ marginBottom: 8 }}>
                <div className="bar-label">{c}</div>
                <div className="bar-track">
                  <div className={`bar-fill ${colors[i % colors.length]}`} style={{ width: `${pct}%`, background: [COLORS.primary, COLORS.secondary, "#2563EB", COLORS.accent, "#9333EA"][i] }}>
                    {pct > 5 && <span>{pct}%</span>}
                  </div>
                </div>
                <span style={{ fontSize: 12, color: COLORS.textMuted, width: 32, textAlign: "right" }}>{v}</span>
              </div>
            );
          })}
        </div>
        <div className="card">
          <div className="card-title">🏷️ School Details</div>
          <table style={{ width: "100%", fontSize: 13 }}>
            <tbody>
              {[["Local Body Type", school.localBodyType || "Grama Panchayat"],["Local Body", school.localBody || school.panchayat || "—"],["Taluk", school.taluk],["Headmaster", school.headmaster],["Establishment", school.estYear],["UDISE", school.udise || "—"],["Email", school.email || "—"]].map(([k, v]) => (
                <tr key={k}><td style={{ color: COLORS.textMuted, padding: "6px 0", width: 130 }}>{k}</td><td style={{ fontWeight: 500 }}>{v}</td></tr>
              ))}

    </>
  );
}

// ─── Data Entry ───────────────────────────────────────────────────────────
function DataEntryPage({ school, data, onUpdate, onSubmit, locked, tab, setTab }) {
  const [saveMsg, setSaveMsg] = useState("");
  if (!school) return <div className="alert alert-warning">School not found.</div>;

  const st = sumStrength(data.strength);
  const communityTotal = Object.values(data.community).reduce((a, v) => a + Number(v || 0), 0);
  const communityMatch = communityTotal === st.total;

  const handleUpdate = (field, value) => {
    onUpdate(field, value);
    setSaveMsg("✅ ഡേറ്റ സേവ് ആയി!");
    setTimeout(() => setSaveMsg(""), 2500);
  };

  const handleSubmit = () => {
    if (!communityMatch && st.total > 0) { alert("Community total does not match student strength!"); return; }
    if (window.confirm("Submit data for 2026–27? You cannot edit after submission.")) onSubmit();
  };

  return (
    <>
      <div className="card" style={{ marginBottom: 20, display: "flex", alignItems: "center", gap: 16 }}>
        <div>
          <h2 style={{ fontSize: 17, fontWeight: 700 }}>{school.name}</h2>
          <p style={{ fontSize: 13, color: COLORS.textMuted }}>Academic Year: 2026–27 · {school.code}</p>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
          <StatusBadge status={data.status} />
          {!locked && data.status !== "submitted" && data.status !== "approved" && (
            <button className="btn btn-primary" onClick={handleSubmit}>📤 Submit Data</button>
          )}
          {locked && <span style={{ fontSize: 13, color: COLORS.textMuted }}>🔒 Locked</span>}
        </div>
      </div>

      {locked && <div className="alert alert-info">🔒 This data has been locked by the District Administrator. Contact admin for changes.</div>}

      <div className="tabs">
        {[["strength","📚 Student Strength"],["community","🏷️ Community"],["admissions","🆕 Admissions"],["staff","👩‍🏫 Staff"],["growth","📈 Growth"]].map(([k, label]) => (
          <div key={k} className={`tab ${tab === k ? "active" : ""}`} onClick={() => setTab(k)}>{label}</div>
        ))}
      </div>

      {saveMsg && (
        <div style={{ position: "fixed", bottom: 24, right: 24, background: "#166534", color: "#fff", padding: "12px 20px", borderRadius: 10, fontWeight: 600, fontSize: 14, zIndex: 999, boxShadow: "0 4px 16px rgba(0,0,0,0.2)" }}>
          {saveMsg}
        </div>
      )}
      <div className={locked ? "submitted-overlay" : ""}>
        {tab === "strength" && <StrengthTab strength={data.strength} onUpdate={s => handleUpdate("strength", s)} />}
        {tab === "community" && <CommunityTab community={data.community} total={st.total} onUpdate={c => handleUpdate("community", c)} />}
        {tab === "admissions" && <AdmissionsTab admissions={data.admissions} onUpdate={a => handleUpdate("admissions", a)} />}
        {tab === "staff" && <StaffTab staff={data.staff} onUpdate={s => handleUpdate("staff", s)} />}
        {tab === "growth" && <GrowthTab current={st.total} prev={data.prevYearTotal} prevNewAdmissions={data.prevYearNewAdmissions} onUpdate={(field, val) => handleUpdate(field, val)} />}
      </div>
    </>
  );
}

function StrengthTab({ strength, onUpdate }) {
  const set = (cls, gender, val) => {
    onUpdate({ ...strength, [cls]: { ...strength[cls], [gender]: Number(val) || 0 } });
  };
  const st = sumStrength(strength);

  return (
    <div className="card">
      <div className="card-title">📚 Class-wise Student Strength</div>
      <div className="table-wrap">
        <table className="class-strength-table">
          <thead>
            <tr><th>Class</th><th>Boys</th><th>Girls</th><th>Total</th></tr>
          </thead>
          <tbody>
            {CLASSES.map(c => {
              const b = Number(strength[c]?.boys || 0), g = Number(strength[c]?.girls || 0);
              return (
                <tr key={c}>
                  <td><strong style={{ color: COLORS.text, fontSize: 14 }}>{c}</strong></td>
                  <td><input type="number" min="0" className="num-input" value={b || ""} onChange={e => set(c, "boys", e.target.value)} placeholder="0" /></td>
                  <td><input type="number" min="0" className="num-input" value={g || ""} onChange={e => set(c, "girls", e.target.value)} placeholder="0" /></td>
                  <td><strong style={{ color: b + g > 0 ? COLORS.secondary : COLORS.textMuted }}>{b + g}</strong></td>
                </tr>
              );
            })}
            <tr className="total-row">
              <td><strong style={{ color: COLORS.secondary }}>TOTAL</strong></td>
              <td><strong style={{ color: COLORS.primary }}>{fmtNum(st.boys)}</strong></td>
              <td><strong style={{ color: COLORS.primary }}>{fmtNum(st.girls)}</strong></td>
              <td><strong style={{ color: COLORS.primary, fontSize: 16 }}>{fmtNum(st.total)}</strong></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

function CommunityTab({ community, total, onUpdate }) {
  const set = (k, v) => onUpdate({ ...community, [k]: Number(v) || 0 });
  const catTotal = Object.values(community).reduce((a, v) => a + Number(v || 0), 0);
  const diff = total - catTotal;
  const ok = diff === 0 || total === 0;

  return (
    <div className="card">
      <div className="card-title">🏷️ Community / Category</div>
      {!ok && <div className="alert alert-warning">⚠️ Category total ({fmtNum(catTotal)}) differs from student strength ({fmtNum(total)}) by {Math.abs(diff)}</div>}
      {ok && total > 0 && <div className="alert alert-success">✅ Category total matches student strength.</div>}
      <div className="form-grid">
        {["SC","ST","OBC","OEC","General"].map(c => (
          <div className="form-group" key={c}>
            <label>{c}</label>

function AdmissionsTab({ admissions, onUpdate }) {

function StaffTab({ staff, onUpdate }) {

  return (

        </div>

function GrowthTab({ current, prev, prevNewAdmissions, onUpdate }) {
  const p = Number(prev || 0);
  const pna = Number(prevNewAdmissions || 0);
  const diff = current - p;
  const growthPct = p > 0 ? ((diff / p) * 100).toFixed(2) : 0;
  const isPositive = diff >= 0;

  return (
    <>
    <div className="card" style={{ marginBottom: 16 }}>
      <div className="card-title">📈 Year-over-Year Growth Analysis</div>
      <div className="form-grid">
        <div className="form-group">
          <label>Previous Year (2025–26) Total Students</label>
          <input type="number" min="0" className="form-control" value={prev || ""}
            onChange={e => onUpdate("prevYearTotal", Number(e.target.value) || 0)}
            placeholder="കഴിഞ്ഞ വർഷത്തെ ആകെ" />
        </div>
        <div className="form-group">
          <label>Previous Year (2025–26) New Admissions</label>
          <input type="number" min="0" className="form-control" value={prevNewAdmissions || ""}
            onChange={e => onUpdate("prevYearNewAdmissions", Number(e.target.value) || 0)}
            placeholder="കഴിഞ്ഞ വർഷത്തെ പ്രവേശനം" />
        </div>
      </div>
      <div className="stats-grid" style={{ marginTop: 16 }}>
        <div className="stat-card">
          <div className="stat-icon blue">📅</div>
          <div className="stat-body"><div className="label">Previous Year Total (2025–26)</div><div className="value">{fmtNum(p)}</div></div>
        </div>
        <div className="stat-card">
          <div className="stat-icon orange">🆕</div>
          <div className="stat-body"><div className="label">Prev Year New Admissions</div><div className="value">{fmtNum(pna)}</div></div>
        </div>
        <div className="stat-card">
          <div className="stat-icon green">📅</div>
          <div className="stat-body"><div className="label">Current Year (2026–27)</div><div className="value">{fmtNum(current)}</div></div>
        </div>
        <div className="stat-card">
          <div className={`stat-icon ${isPositive ? "green" : "red"}`}>{isPositive ? "📈" : "📉"}</div>
          <div className="stat-body">
            <div className="label">Net Difference</div>
            <div className="value" style={{ color: isPositive ? COLORS.success : COLORS.danger }}>{isPositive ? "+" : ""}{fmtNum(diff)}</div>
          </div>
        </div>
        <div className="stat-card">
          <div className={`stat-icon ${isPositive ? "green" : "red"}`}>%</div>
          <div className="stat-body">
            <div className="label">Growth %</div>
            <div className="value" style={{ color: isPositive ? COLORS.success : COLORS.danger }}>{isPositive ? "+" : ""}{growthPct}%</div>
          </div>
        </div>
      </div>
      {p > 0 && (
        <div className={`alert ${isPositive ? "alert-success" : "alert-danger"}`} style={{ marginTop: 16 }}>
          {isPositive ? "📈" : "📉"} {isPositive
            ? `Student strength increased by ${fmtNum(diff)} (${growthPct}%) compared to last year.`
            : `Student strength decreased by ${fmtNum(Math.abs(diff))} (${Math.abs(growthPct)}%) compared to last year.`}
        </div>
      )}
    </div>
    </>
  );
}

    </table>

    <h3>Growth Analysis</h3>
    <table>

      <tbody><tr><td>${pv}</td><td>${pna}</td><td>${st.total}</td><td style="color:${diff>=0?"green":"red"};font-weight:700">${diff>=0?"+":""}${diff}</td><td>${pct}%</td></tr></tbody>
    </table>

    <h3>അധ്യാപകർ (${teachers.length})</h3>

      <thead><tr><th>#</th><th>പേര്</th><th>ഫോൺ</th><th>Join Year</th><th>Exp</th><th>Training</th><th>Subjects</th></tr></thead>
      <tbody>${teacherRows}</tbody>
    </table>

    <h3>സമിതി അംഗങ്ങൾ (${samithi.length})</h3>
    <table>
      <thead><tr><th>#</th><th>പേര്</th><th>ചുമതല</th><th>ഫോൺ</th><th>മേൽവിലാസം</th></tr></thead>
      <tbody>${samithiRows}</tbody>
    </table>

    </body></html>`);
  win.document.close();
  setTimeout(() => win.print(), 500);
}

function ReportsPage({ schools, schoolData, selectedId, isSchoolUser }) {
  const [filter, setFilter] = useState({ school: selectedId ? String(selectedId) : "all", taluk: "all", panchayat: "all" });
  const [view, setView] = useState(isSchoolUser ? "schoolwise" : "district");

  const taluks = [...new Set(schools.map(s => s.taluk))].filter(Boolean);
  const panchayats = [...new Set(schools.map(s => s.panchayat))].filter(Boolean);

  const filtered = isSchoolUser
    ? schools // already filtered to own school before passing in
    : schools.filter(s => {
        if (filter.school !== "all" && s.id !== Number(filter.school)) return false;
        if (filter.taluk !== "all" && s.taluk !== filter.taluk) return false;
        if (filter.panchayat !== "all" && s.panchayat !== filter.panchayat) return false;
        return true;
      });

  const printReport = () => {
    const printWin = window.open("", "_blank");
    if (!printWin) { alert("Pop-up blocked ആണ്! Browser settings-ൽ pop-ups allow ചെയ്യുക."); return; }

    // Build full HTML report with all sections
    const buildTable = (headers, rows, footer) => `
      <table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr></thead>
      <tbody>${rows.map((r,i)=>`<tr class="${i%2===0?"":"alt"}">${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>
      ${footer ? `<tfoot><tr>${footer.map(c=>`<td>${c}</td>`).join("")}</tr></tfoot>` : ""}
      </table>`;

    const allD = filtered.map(s => schoolData[s.id] || makeSchoolData(s.id));
    const totB = allD.reduce((a,d)=>a+sumStrength(d.strength).boys,0);
    const totG = allD.reduce((a,d)=>a+sumStrength(d.strength).girls,0);
    const totT = allD.reduce((a,d)=>a+Number(d.staff.maleteachers||0)+Number(d.staff.femaleteachers||0),0);
    const totTr = allD.reduce((a,d)=>a+Number(d.staff.trained||0),0);
    const totUt = allD.reduce((a,d)=>a+Number(d.staff.untrained||0),0);
    const totOS = allD.reduce((a,d)=>a+Number(d.staff.officestaff||0),0);
    const totOT = allD.reduce((a,d)=>a+Number(d.staff.otherstaff||0),0);
    const totBS = allD.reduce((a,d)=>a+Number(d.staff.busstaff||0),0);
    const totAy = allD.reduce((a,d)=>a+Number(d.staff.ayah||0),0);
    const totSC = allD.reduce((a,d)=>a+Number(d.community.SC||0),0);
    const totST = allD.reduce((a,d)=>a+Number(d.community.ST||0),0);
    const totOBC= allD.reduce((a,d)=>a+Number(d.community.OBC||0),0);
    const totOEC= allD.reduce((a,d)=>a+Number(d.community.OEC||0),0);
    const totGen= allD.reduce((a,d)=>a+Number(d.community.General||0),0);

    const strRows  = filtered.map((s,i)=>{ const st=sumStrength(allD[i].strength); return [i+1,s.name,st.boys,st.girls,`<b>${st.total}</b>`]; });
    const tchRows  = filtered.map((s,i)=>{ const m=Number(allD[i].staff.maleteachers||0),f=Number(allD[i].staff.femaleteachers||0); return [i+1,s.name,m,f,`<b>${m+f}</b>`]; });
    const trnRows  = filtered.map((s,i)=>{ const tr=Number(allD[i].staff.trained||0),ut=Number(allD[i].staff.untrained||0),tot=Number(allD[i].staff.maleteachers||0)+Number(allD[i].staff.femaleteachers||0); return [i+1,s.name,tr,ut,`<b>${tot}</b>`]; });
    const ntRows   = filtered.map((s,i)=>{ const os=Number(allD[i].staff.officestaff||0),ot=Number(allD[i].staff.otherstaff||0),bs=Number(allD[i].staff.busstaff||0),ay=Number(allD[i].staff.ayah||0); return [i+1,s.name,os,ot,bs,ay,`<b>${os+ot+bs+ay}</b>`]; });
    const comRows  = filtered.map((s,i)=>{ const c=allD[i].community,ct=["SC","ST","OBC","OEC","General"].reduce((a,k)=>a+Number(c[k]||0),0); return [i+1,s.name,c.SC||0,c.ST||0,c.OBC||0,c.OEC||0,c.General||0,`<b>${ct}</b>`]; });
    const grwRows  = filtered.map((s,i)=>{ const pv=Number(allD[i].prevYearTotal||0),pna=Number(allD[i].prevYearNewAdmissions||0),cur=sumStrength(allD[i].strength).total,diff=cur-pv,pct=pv>0?((diff/pv)*100).toFixed(1):"-"; return [i+1,s.name,pv,pna,cur,`<b style="color:${diff>=0?"green":"red"}">${diff>=0?"+":""}${diff}</b>`,pct+"%"]; });

    // ── Presence stats ──
    const allTaluks = KOLLAM_TALUKS;
    const activeTaluks = new Set(filtered.map(s=>s.taluk).filter(Boolean));
    const allGP   = KOLLAM_LOCAL_BODIES["Grama Panchayat"];
    const activeGP= new Set(filtered.filter(s=>(s.localBodyType||"Grama Panchayat")==="Grama Panchayat").map(s=>s.localBody));
    const allMun  = KOLLAM_LOCAL_BODIES["Municipality"];
    const activeMun= new Set(filtered.filter(s=>s.localBodyType==="Municipality").map(s=>s.localBody));
    const allCorp = KOLLAM_LOCAL_BODIES["Corporation"];
    const activeCorp= new Set(filtered.filter(s=>s.localBodyType==="Corporation").map(s=>s.localBody));

    const totMale = allD.reduce((a,d)=>a+Number(d.staff.maleteachers||0),0);
    const totFem  = allD.reduce((a,d)=>a+Number(d.staff.femaleteachers||0),0);
    const totPrevAll = allD.reduce((a,d)=>a+Number(d.prevYearTotal||0),0);

    const presenceChart = `
      <table class="presence-table">
        <thead>
          <tr>
            <th>തരം</th>

          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="lbl">താലൂക്ക് (Taluk)</td>
            <td class="num">${allTaluks.length}</td>
            <td class="num active">${activeTaluks.size}</td>
            <td class="num inactive">${allTaluks.length - activeTaluks.size}</td>
          </tr>
          <tr class="alt">
            <td class="lbl">ഗ്രാമ പഞ്ചായത്ത് (Grama Panchayat)</td>

            <td class="num active">${activeGP.size}</td>
            <td class="num inactive">${allGP.length - activeGP.size}</td>
          </tr>
          <tr>
            <td class="lbl">മുനിസിപ്പാലിറ്റി (Municipality)</td>
            <td class="num">${allMun.length}</td>
            <td class="num active">${activeMun.size}</td>
            <td class="num inactive">${allMun.length - activeMun.size}</td>
          </tr>
          <tr class="alt">
            <td class="lbl">കോർപ്പറേഷൻ (Corporation)</td>
            <td class="num">${allCorp.length}</td>
            <td class="num active">${activeCorp.size}</td>
            <td class="num inactive">${allCorp.length - activeCorp.size}</td>
          </tr>
        </tbody>
      </table>`;

    // ── Class-wise rows ──
    const classRows = filtered.map((s,i) => {
      const d = allD[i];
      const cells = CLASSES.map(c => {
        const b = Number(d.strength?.[c]?.boys||0);
        const g = Number(d.strength?.[c]?.girls||0);
        return `${b}/${g}/<b>${b+g}</b>`;
      });
      const st = sumStrength(d.strength);
      return [i+1, s.name, ...cells, `<b>${st.boys}/${st.girls}/${st.total}</b>`];
    });
    const classFooter = ["", "<b>TOTAL (B/G/T)</b>"];
    CLASSES.forEach(c => {
      const cb = filtered.reduce((a,s,i)=>a+Number(allD[i].strength?.[c]?.boys||0),0);
      const cg = filtered.reduce((a,s,i)=>a+Number(allD[i].strength?.[c]?.girls||0),0);
      classFooter.push(`<b>${cb}/${cg}/${cb+cg}</b>`);
    });
    classFooter.push(`<b>${totB}/${totG}/${totB+totG}</b>`);

    // ── Staff Summary (Teaching + Non-Teaching + Grand Total) ──
    const staffSummaryRows = filtered.map((s,i) => {
      const d = allD[i];
      const m = Number(d.staff.maleteachers||0), f = Number(d.staff.femaleteachers||0);
      const teach = m+f;
      const nt = Number(d.staff.officestaff||0)+Number(d.staff.otherstaff||0)+Number(d.staff.busstaff||0)+Number(d.staff.ayah||0);
      return [i+1, s.name, m, f, `<b>${teach}</b>`, nt, `<b>${teach+nt}</b>`];
    });
    const totNTAll = totOS+totOT+totBS+totAy;
    const staffSummaryFooter = ["<b>TOTAL</b>","",totMale,totFem,`<b>${totT}</b>`,totNTAll,`<b>${totT+totNTAll}</b>`];

    const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
    <title>BVN Kollam – Full Report 2026-27</title>
    <style>
      *{box-sizing:border-box}
      body{font-family:"Segoe UI","Noto Sans Malayalam",sans-serif;padding:24px;font-size:12px;color:#1C2A40}
      h1{font-size:18px;text-align:center;color:#1C2A40;margin-bottom:4px}
      h2{font-size:13px;color:#D4500A;margin:22px 0 8px;border-bottom:2px solid #D4500A;padding-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
      .subtitle{text-align:center;color:#666;margin-bottom:24px;font-size:12px}

      table{border-collapse:collapse;width:100%;margin-bottom:8px}
      th{background:#1C2A40;color:#fff;padding:7px 10px;text-align:center;font-size:11px}
      td{border:1px solid #ddd;padding:6px 10px;text-align:center;font-size:12px}
      td:nth-child(2){text-align:left}
      tr.alt td{background:#f7f7f7}
      tfoot td{background:#1A6B3A;color:#fff;font-weight:700;padding:7px 10px}

      /* Presence chart */
      .presence-table th{font-size:12px;padding:10px 14px}
      .presence-table td{font-size:14px;padding:10px 14px}
      .presence-table td.lbl{text-align:left;font-weight:600;font-size:13px}
      .presence-table td.num{font-size:20px;font-weight:700;width:120px}
      .presence-table td.active{color:#166534;background:#f0fdf4}
      .presence-table td.inactive{color:#991B1B;background:#fef2f2}
      .presence-table tfoot td{font-size:16px;padding:10px 14px}

      .class-wise table, .class-wise th, .class-wise td { font-size:9px; padding:4px 3px; }

      @media print{
        @page{size:A4;margin:8mm;orientation:landscape}
        button{display:none}
        h2{page-break-before:auto}
        .presence-table{page-break-inside:avoid}
      }
    </style></head><body>
    <h1>BHARATHEEYA VIDYA NIKETAN – KOLLAM DISTRICT</h1>
    <p class="subtitle">Annual Statistics Report · Academic Year 2026–27 · ${filtered.length} Schools · ${new Date().toLocaleDateString("en-IN")}</p>

    <h2>1. Local Body Presence</h2>
    ${presenceChart}

    <h2>2. Student Strength</h2>
    ${buildTable(["#","School","Boys","Girls","Total"], strRows, ["<b>TOTAL ("+filtered.length+" Schools)</b>","",totB,totG,"<b>"+(totB+totG)+"</b>"])}

    <h2>3. Class-wise Student Strength (Boys/Girls/Total)</h2>
    <div class="class-wise">${buildTable(["#","School",...CLASSES,"School Total"], classRows, classFooter)}</div>

    <h2>4. Staff Summary — Teaching &amp; Non-Teaching</h2>
    ${buildTable(["#","School","Male Teachers","Female Teachers","Teaching Total","Non-Teaching Total","Grand Total"], staffSummaryRows, staffSummaryFooter)}

    <h2>5. District Growth Summary</h2>
    ${buildTable(["ഇപ്പോഴത്തെ ആകെ കുട്ടികൾ (2026–27)","കഴിഞ്ഞ വർഷത്തെ ആകെ (2025–26)","വ്യത്യാസം","Growth %"],
      [[ `<b>${totB+totG}</b>`, totPrevAll, `<b style="color:${(totB+totG-totPrevAll)>=0?"green":"red"}">${(totB+totG-totPrevAll)>=0?"+":""}${totB+totG-totPrevAll}</b>`, totPrevAll>0?(((totB+totG-totPrevAll)/totPrevAll)*100).toFixed(1)+"%":"—" ]], null)}

    <h2>6. Teacher Training Status</h2>
    ${buildTable(["#","School","Trained","Untrained","Total"], trnRows, ["<b>TOTAL</b>","",totTr,totUt,"<b>"+totT+"</b>"])}

    <h2>7. Non-Teaching Staff</h2>
    ${buildTable(["#","School","Office Staff","Other Staff","Bus Staff","Aaya","Total"], ntRows, ["<b>TOTAL</b>","",totOS,totOT,totBS,totAy,"<b>"+(totOS+totOT+totBS+totAy)+"</b>"])}

    <h2>8. Community-wise</h2>

    <h2>9. Growth Analysis</h2>
    ${buildTable(["#","School","Prev Year Total","Prev Year New Admissions","Current Year","Difference","Growth %"], grwRows, [])}

    </body></html>`;

        </div>
      </div>
      )}

function DistrictReport({ schools, schoolData }) {
  const allData = schools.map(s => schoolData[s.id] || makeSchoolData(s.id));
  const totals = {
    boys:    allData.reduce((a, d) => a + sumStrength(d.strength).boys, 0),
    girls:   allData.reduce((a, d) => a + sumStrength(d.strength).girls, 0),
    total:   allData.reduce((a, d) => a + sumStrength(d.strength).total, 0),
    male:    allData.reduce((a, d) => a + Number(d.staff.maleteachers || 0), 0),
    female:  allData.reduce((a, d) => a + Number(d.staff.femaleteachers || 0), 0),
    SC:      allData.reduce((a, d) => a + Number(d.community.SC || 0), 0),
    ST:      allData.reduce((a, d) => a + Number(d.community.ST || 0), 0),
    OBC:     allData.reduce((a, d) => a + Number(d.community.OBC || 0), 0),
    OEC:     allData.reduce((a, d) => a + Number(d.community.OEC || 0), 0),
    General: allData.reduce((a, d) => a + Number(d.community.General || 0), 0),
    officestaff: allData.reduce((a,d) => a + Number(d.staff.officestaff||0), 0),
    otherstaff:  allData.reduce((a,d) => a + Number(d.staff.otherstaff||0), 0),
    busstaff:    allData.reduce((a,d) => a + Number(d.staff.busstaff||0), 0),
    ayah:        allData.reduce((a,d) => a + Number(d.staff.ayah||0), 0),
  };
  totals.teachers = totals.male + totals.female;

  const thStyle = { background: COLORS.navBg, color: "#fff", padding: "8px 10px", fontSize: 12, textAlign: "center" };
  const tdStyle = { padding: "7px 10px", fontSize: 13, textAlign: "center", borderBottom: `1px solid ${COLORS.border}` };
  const tdName = { ...tdStyle, textAlign: "left", fontWeight: 600 };
  const tfoot = { background: "#1A6B3A", color: "#fff", fontWeight: 700, padding: "8px 10px", textAlign: "center" };

  return (
    <>
      {/* Header */}
      <div className="card" style={{ marginBottom: 20, textAlign: "center" }}>
        <h3 style={{ fontSize: 16, fontWeight: 800, color: COLORS.navBg }}>BHARATHEEYA VIDYA NIKETAN – KOLLAM DISTRICT</h3>
        <p style={{ fontSize: 13, color: COLORS.textMuted }}>Annual Statistics Report · Academic Year 2026–27</p>
        <p style={{ fontSize: 12, color: COLORS.textMuted }}>{schools.length} Schools · {new Date().toLocaleDateString("en-IN")}</p>
      </div>

      {/* 1. Student Strength — school-by-school */}
      <div className="card" style={{ marginBottom: 20 }}>
        <div className="card-title">👨‍🎓 വിദ്യാർത്ഥി ശക്തി (Student Strength)</div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th style={thStyle}>#</th>
                <th style={{...thStyle, textAlign:"left"}}>School</th>
                <th style={thStyle}>Boys</th>
                <th style={thStyle}>Girls</th>
                <th style={thStyle}>Total</th>
              </tr>
            </thead>
            <tbody>
              {schools.map((s, i) => {
                const d = schoolData[s.id] || makeSchoolData(s.id);
                const st = sumStrength(d.strength);
                return (
                  <tr key={s.id} style={{ background: i % 2 === 0 ? "#fff" : COLORS.bg }}>
                    <td style={tdStyle}>{i + 1}</td>
                    <td style={tdName}>{s.name}</td>
                    <td style={tdStyle}>{fmtNum(st.boys)}</td>
                    <td style={tdStyle}>{fmtNum(st.girls)}</td>
                    <td style={{...tdStyle, fontWeight:700, color: COLORS.primary}}>{fmtNum(st.total)}</td>
                  </tr>
                );
              })}
            </tbody>
            <tfoot>
              <tr>
                <td colSpan={2} style={{...tfoot, textAlign:"left"}}>ആകെ TOTAL ({schools.length} Schools)</td>
                <td style={tfoot}>{fmtNum(totals.boys)}</td>
                <td style={tfoot}>{fmtNum(totals.girls)}</td>
                <td style={tfoot}>{fmtNum(totals.total)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>

      {/* 1.5. Class-wise Student Strength — all schools, all classes */}
      <div className="card" style={{ marginBottom: 20 }}>
        <div className="card-title">📚 ക്ലാസ് അടിസ്ഥാനത്തിൽ വിദ്യാർത്ഥി ശക്തി (Class-wise Student Strength)</div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th style={{...thStyle, textAlign:"left"}}>School</th>
                {CLASSES.map(c => (
                  <th key={c} colSpan={3} style={thStyle}>{c}</th>
                ))}
                <th colSpan={3} style={{...thStyle, background: COLORS.primary}}>School Total</th>
              </tr>
              <tr>
                <th style={{...thStyle, textAlign:"left"}}></th>
                {CLASSES.map(c => (
                  <React.Fragment key={c}>
                    <th style={{...thStyle, fontSize:11}}>B</th>
                    <th style={{...thStyle, fontSize:11}}>G</th>
                    <th style={{...thStyle, fontSize:11, background:"#374151"}}>T</th>
                  </React.Fragment>
                ))}
                <th style={{...thStyle, fontSize:11, background: COLORS.primaryDark}}>B</th>
                <th style={{...thStyle, fontSize:11, background: COLORS.primaryDark}}>G</th>
                <th style={{...thStyle, fontSize:11, background: COLORS.primaryDark}}>T</th>
              </tr>
            </thead>

function TeachersPage({ data, onUpdate, subjects }) {
  const teachers = data.teachers || [];
  const [form, setForm] = useState({ name:"", phone:"", joinYear:"", prevExp:"", trained: false, subjects:[] });
  const [editIdx, setEditIdx] = useState(null);
  const [showForm, setShowForm] = useState(false);

  const subList = subjects && subjects.length > 0 ? subjects : DEFAULT_SUBJECTS;

  const save = () => {
    if (!form.name.trim()) { alert("പേര് കൊടുക്കുക"); return; }
    let updated;
    if (editIdx !== null) {
      updated = teachers.map((t,i) => i === editIdx ? form : t);
    } else {
      updated = [...teachers, { ...form, id: Date.now() }];
    }
    onUpdate("teachers", updated);
    setForm({ name:"", phone:"", joinYear:"", prevExp:"", trained: false, subjects:[] });
    setEditIdx(null); setShowForm(false);
  };

  const del = (i) => {
    if (!window.confirm("Delete this teacher?")) return;
    onUpdate("teachers", teachers.filter((_,idx) => idx !== i));
  };

  const edit = (i) => {
    setForm({ ...teachers[i], subjects: teachers[i].subjects || [] });
    setEditIdx(i); setShowForm(true);
  };

  const toggleSubject = (s) => {
    setForm(f => ({
      ...f,
      subjects: f.subjects.includes(s) ? f.subjects.filter(x=>x!==s) : [...f.subjects, s]
    }));
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <h2 style={{ fontSize:18, fontWeight:700, color:COLORS.navBg }}>👨‍🏫 അധ്യാപകർ ({teachers.length})</h2>
        <button className="btn btn-primary btn-sm" onClick={() => { setForm({ name:"", phone:"", joinYear:"", prevExp:"", trained:false, subjects:[] }); setEditIdx(null); setShowForm(true); }}>
          ➕ Add Teacher
        </button>
      </div>

      {showForm && (
        <div className="card" style={{ marginBottom:20, border:`2px solid ${COLORS.primary}` }}>
          <div className="card-title">{editIdx !== null ? "✏️ Edit Teacher" : "➕ New Teacher"}</div>
          <div className="form-grid">
            <div className="form-group">
              <label>പേര് *</label>
              <input className="form-control" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Teacher name" />
            </div>
            <div className="form-group">
              <label>ഫോൺ</label>
              <input className="form-control" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="Phone number" />
            </div>

// ─── SubjectsPage (Admin) ─────────────────────────────────────────────────
function SubjectsPage({ subjects, onSave }) {
  const [list, setList] = useState(subjects || DEFAULT_SUBJECTS);
  const [newSub, setNewSub] = useState("");

  const add = () => {
    const s = newSub.trim();
    if (!s) return;
    if (list.includes(s)) { alert("Already exists"); return; }
    const updated = [...list, s];
    setList(updated); onSave(updated); setNewSub("");
  };

  const del = (s) => {
    if (!window.confirm(`Delete "${s}"?`)) return;
    const updated = list.filter(x=>x!==s);
    setList(updated); onSave(updated);
  };

  return (
    <div className="card">
      <div className="card-title">📚 Subjects Management</div>
      <div style={{ display:"flex", gap:10, marginBottom:20 }}>
        <input className="form-control" style={{ maxWidth:300 }} value={newSub}
          onChange={e=>setNewSub(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&add()}
          placeholder="New subject name" />
        <button className="btn btn-primary" onClick={add}>➕ Add</button>
      </div>
      <div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>
        {list.map(s=>(
          <div key={s} style={{ display:"flex", alignItems:"center", gap:6, background:COLORS.bg, border:`1px solid ${COLORS.border}`, borderRadius:20, padding:"6px 14px" }}>
            <span style={{ fontSize:14, fontWeight:500 }}>{s}</span>
            <button onClick={()=>del(s)} style={{ background:"none", border:"none", color:COLORS.danger, cursor:"pointer", fontSize:16, lineHeight:1 }}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function exportCSV(schools, schoolData) {
  const rows = [["#","School","Code","Level","Local Body Type","Local Body","Taluk","Boys","Girls","Total","Teachers","SC","ST","OBC","OEC","General","Status"]];
  schools.forEach((s, i) => {
    const d = schoolData[s.id] || makeSchoolData(s.id);
    const st = sumStrength(d.strength);
    const t = Number(d.staff.maleteachers || 0) + Number(d.staff.femaleteachers || 0);
    rows.push([i+1, s.name, s.code, s.level, s.localBodyType||"Grama Panchayat", s.localBody||"", s.taluk, st.boys, st.girls, st.total, t, d.community.SC||0, d.community.ST||0, d.community.OBC||0, d.community.OEC||0, d.community.General||0, d.status]);
  });
  const csv = rows.map(r => r.map(c => `"${c}"`).join(",")).join("\n");
  const BOM = "\uFEFF";
  const blob = new Blob([BOM + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.setAttribute("download", "BVN_Kollam_Report_2026-27.csv");
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function exportFullReport(schools, schoolData) {
  const sep = (title) => [[], [`=== ${title} ===`], []];
  let rows = [];

  // Section 1: School-wise
  rows.push(...sep("SCHOOL-WISE REPORT"));
  rows.push(["#","School","Code","Level","Local Body","Taluk","Boys","Girls","Total","Teachers","SC","ST","OBC","OEC","General","Status"]);
  schools.forEach((s, i) => {
    const d = schoolData[s.id] || makeSchoolData(s.id);
    const st = sumStrength(d.strength);
    const t = Number(d.staff.maleteachers||0) + Number(d.staff.femaleteachers||0);
    rows.push([i+1, s.name, s.code, s.level, `${s.localBodyType||"GP"} - ${s.localBody||""}`, s.taluk, st.boys, st.girls, st.total, t, d.community.SC||0, d.community.ST||0, d.community.OBC||0, d.community.OEC||0, d.community.General||0, d.status]);
  });

  // Section 2: Taluk-wise presence
  rows.push(...sep("TALUK-WISE PRESENCE"));
  rows.push(["Taluk","Schools","Panchayat Active","Panchayat Inactive","Municipality Active","Municipality Inactive","Corporation Active"]);
  KOLLAM_TALUKS.forEach(taluk => {
    const ts = schools.filter(s => s.taluk === taluk);
    const aP = new Set(ts.filter(s=>(s.localBodyType||"Grama Panchayat")==="Grama Panchayat").map(s=>s.localBody)).size;
    const aM = new Set(ts.filter(s=>s.localBodyType==="Municipality").map(s=>s.localBody)).size;
    const aC = new Set(ts.filter(s=>s.localBodyType==="Corporation").map(s=>s.localBody)).size;
    rows.push([taluk, ts.length, aP, KOLLAM_LOCAL_BODIES["Grama Panchayat"].length - aP, aM, KOLLAM_LOCAL_BODIES["Municipality"].length - aM, aC]);
  });

  // Section 3: Local body presence
  rows.push(...sep("LOCAL BODY PRESENCE SUMMARY"));
  rows.push(["Local Body Type","Total","Active","Inactive"]);
  const lbTypes = [["Grama Panchayat","🌾"],["Municipality","🏘️"],["Corporation","🏙️"]];
  lbTypes.forEach(([type]) => {
    const all = KOLLAM_LOCAL_BODIES[type].length;
    const active = new Set(schools.filter(s=>(s.localBodyType||"Grama Panchayat")===type).map(s=>s.localBody)).size;
    rows.push([type, all, active, all - active]);
  });

  // Section 4: District summary
  rows.push(...sep("DISTRICT SUMMARY"));
  const allD = schools.map(s => schoolData[s.id] || makeSchoolData(s.id));
  rows.push(["Total Schools", schools.length]);
  rows.push(["Total Boys", allD.reduce((a,d)=>a+sumStrength(d.strength).boys,0)]);
  rows.push(["Total Girls", allD.reduce((a,d)=>a+sumStrength(d.strength).girls,0)]);
  rows.push(["Total Students", allD.reduce((a,d)=>a+sumStrength(d.strength).total,0)]);
  rows.push(["Total Teachers", allD.reduce((a,d)=>a+Number(d.staff.maleteachers||0)+Number(d.staff.femaleteachers||0),0)]);

  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const BOM = "\uFEFF";
  const blob = new Blob([BOM + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.setAttribute("download", "BVN_Kollam_FullReport_2026-27.csv");
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

    function AppWithFirebase() {
      const { schools, setSchools, schoolData, setSchoolData, subjects, setSubjects, users, setUsers, ready } =
        useFirebase(INITIAL_SCHOOLS, INITIAL_SCHOOL_DATA, USERS);
      const [user, setUser]                         = useState(null);
      const [page, setPage]                         = useState("dashboard");
      const [sidebarOpen, setSidebarOpen]           = useState(true);
      const [selectedSchoolId, setSelectedSchoolId] = useState(null);
      const [dataTab, setDataTab]                   = useState("strength");
      const [saveMsg, setSaveMsg]                   = useState("");

      const showSaved = (msg="✅ ഡേറ്റ സേവ് ആയി!") => { setSaveMsg(msg); setTimeout(()=>setSaveMsg(""),2500); };
      const login = (u,p) => { const f=users.find(x=>x.username===u&&x.password===p); if(f){setUser(f);setPage("dashboard");return true;} return false; };
      const updateUserPassword = async (userId, newPassword) => {
        const nl = users.map(x => x.id===userId ? {...x, password:newPassword} : x);
        setUsers(nl); await fbSaveUsers(nl); showSaved("🔐 Password updated!");
      };
      const logout = () => { setUser(null); setPage("dashboard"); };
      const addSchool = async (school) => {
        const id=Date.now(); const ns={...school,id}; const nl=[...schools,ns];
        setSchools(nl); setSchoolData(prev=>({...prev,[id]:makeSchoolData(id)}));
        await fbSaveSchools(nl); await fbSaveSchoolData(id,makeSchoolData(id));
        showSaved("✅ സ്കൂൾ add ആയി!");
      };
      const deleteSchool = async (id) => {
        if(!window.confirm("ഈ സ്കൂൾ നീക്കം ചെയ്യണോ?")) return;
        const nl=schools.filter(s=>s.id!==id);
        setSchools(nl); setSchoolData(prev=>{const n={...prev};delete n[id];return n;});
        await fbSaveSchools(nl); await fbDeleteSchoolData(id);
        showSaved("🗑️ സ്കൂൾ നീക്കം ചെയ്തു!");
      };
      const updateSchoolProfile = async (id,updates) => {
        const nl=schools.map(s=>s.id===id?{...s,...updates}:s);
        setSchools(nl); await fbSaveSchools(nl); showSaved();
      };
      const updateData = async (schoolId,field,value) => {
        const updated={...(schoolData[schoolId]||makeSchoolData(schoolId)),[field]:value};
        setSchoolData(prev=>({...prev,[schoolId]:updated}));
        await fbSaveSchoolData(schoolId,updated); showSaved();
      };
      const submitData = async (schoolId) => {
        const updated={...(schoolData[schoolId]||makeSchoolData(schoolId)),status:"submitted",submittedAt:new Date().toISOString()};
        setSchoolData(prev=>({...prev,[schoolId]:updated}));
        await fbSaveSchoolData(schoolId,updated); showSaved("✅ Data submit ആയി!");
      };
      const approveData = async (schoolId) => {
        const updated={...(schoolData[schoolId]||makeSchoolData(schoolId)),status:"approved"};
        setSchoolData(prev=>({...prev,[schoolId]:updated}));
        await fbSaveSchoolData(schoolId,updated); showSaved("✅ Approved!");
      };
      const lockData = async (schoolId) => {
        const updated={...(schoolData[schoolId]||makeSchoolData(schoolId)),status:"locked",lockedAt:new Date().toISOString()};
        setSchoolData(prev=>({...prev,[schoolId]:updated}));
        await fbSaveSchoolData(schoolId,updated); showSaved("🔒 Locked!");
      };
      const unlockData = async (schoolId) => {
        const updated={...(schoolData[schoolId]||makeSchoolData(schoolId)),status:"approved",lockedAt:null};
        setSchoolData(prev=>({...prev,[schoolId]:updated}));
        await fbSaveSchoolData(schoolId,updated); showSaved("🔓 Unlocked!");
      };
      const saveSubjects = async (list) => {
        setSubjects(list); await fbSaveSubjects(list); showSaved("📚 Subjects updated!");
      };

      if (!ready) return null;
      if (!user) return <LoginScreen onLogin={login} />;

      const mySchoolId = user.role==="school" ? user.schoolId : (selectedSchoolId||schools[0]?.id);
      const mySchool   = schools.find(s=>s.id===mySchoolId);
      const myData     = schoolData[mySchoolId]||makeSchoolData(mySchoolId);
      const isLocked   = myData.status==="locked";

      return (
        <>
          <style dangerouslySetInnerHTML={{ __html: css }} />
          {saveMsg && (
            <div style={{position:"fixed",bottom:24,right:24,background:"#166534",color:"#fff",
              padding:"12px 20px",borderRadius:10,fontWeight:600,fontSize:14,
              zIndex:9999,boxShadow:"0 4px 16px rgba(0,0,0,0.25)"}}>
              {saveMsg}
            </div>
          )}
          <div className="app-shell">
            <Sidebar user={user} page={page} setPage={setPage}
              sidebarOpen={sidebarOpen} onLogout={logout}
              onToggle={()=>setSidebarOpen(o=>!o)} />
            <div className={`main-content ${sidebarOpen?"":"full"}`}>
              <div className="district-banner">
                <span className="banner-om">ॐ</span>
                <div className="banner-text">
                  <h2>Bharatheeya Vidya Niketan – Kollam District</h2>
                  <p>School Information Management System</p>
                </div>
                <span className="banner-year">2026–27</span>
              </div>
              <Topbar title={pageTitle(page)} onToggle={()=>setSidebarOpen(o=>!o)} user={user} />
              <div className="page">
                {page==="dashboard" && (user.role==="admin"
                  ? <AdminDashboard schools={schools} schoolData={schoolData} />
                  : <SchoolDashboard school={mySchool} data={myData} />
                )}
                {page==="schools" && user.role==="admin" && (
                  <SchoolsPage schools={schools} schoolData={schoolData}
                    onSelect={(id)=>{setSelectedSchoolId(id);setPage("data-entry");}}
                    onAdd={addSchool} onDelete={deleteSchool}
                    onApprove={approveData} onLock={lockData} onUnlock={unlockData} />
                )}
                {page==="schools" && user.role==="school" && <div className="alert alert-danger">🚫 ഈ പേജ് കാണാൻ അനുമതിയില്ല.</div>}
                {page==="users"   && user.role==="school" && <div className="alert alert-danger">🚫 ഈ പേജ് കാണാൻ അനുമതിയില്ല.</div>}
                {page==="profile" && <ProfilePage school={mySchool} onSave={(u)=>updateSchoolProfile(mySchoolId,u)} readOnly={user.role==="school"?isLocked:false} />}
                {page==="data-entry" && (
                  <DataEntryPage school={mySchool} data={myData}
                    onUpdate={(f,v)=>updateData(mySchoolId,f,v)}
                    onSubmit={()=>submitData(mySchoolId)}
                    locked={isLocked} tab={dataTab} setTab={setDataTab} />
                )}
                {page==="reports" && (
                  <ReportsPage
                    schools={user.role==="school"?schools.filter(s=>s.id===user.schoolId):schools}
                    schoolData={schoolData}
                    selectedId={user.role==="school"?user.schoolId:null}
                    isSchoolUser={user.role==="school"}
                    mySchool={mySchool} myData={myData} />
                )}
                {page==="users"    && user.role==="admin" && <UsersPage schools={schools} users={users} onUpdatePassword={updateUserPassword} />}
                {page==="teachers" && user.role==="school" && <TeachersPage data={myData} subjects={subjects} onUpdate={(f,v)=>updateData(mySchoolId,f,v)} />}
                {page==="samithi"  && user.role==="school" && <SamithiPage  data={myData} onUpdate={(f,v)=>updateData(mySchoolId,f,v)} />}
                {page==="subjects" && user.role==="admin"  && <SubjectsPage subjects={subjects} onSave={saveSubjects} />}
                {page==="teacher-reports" && user.role==="admin" && <TeacherReportsPage schools={schools} schoolData={schoolData} subjects={subjects} />}
              </div>
            </div>
          </div>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<AppWithFirebase />);
</script>
</body>
</html>
