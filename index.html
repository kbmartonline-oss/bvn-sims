  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const fbSaveSchools    = (data) => db.collection("config").doc("schools").set({ list: data });
    const fbSaveSchoolData = (id, data) => db.collection("schoolData").doc(String(id)).set(data);
    const fbDeleteSchoolData = (id) => db.collection("schoolData").doc(String(id)).delete();
    const fbSaveSubjects   = (data) => db.collection("config").doc("subjects").set({ list: data });
    const fbSaveUsers       = (data) => db.collection("config").doc("users").set({ list: data });

    function useFirebase(initialSchools, initialData, initialUsers) {
      const [schools, setSchools]       = useState(initialSchools);
      const [schoolData, setSchoolData] = useState(initialData);
      const [subjects, setSubjects]     = useState(DEFAULT_SUBJECTS);
      const [users, setUsers]           = useState(initialUsers);
      const [ready, setReady]           = useState(false);
      useEffect(() => {
        Promise.all([
          db.collection("config").doc("schools").get(),
          db.collection("config").doc("subjects").get(),
          db.collection("config").doc("users").get(),
          db.collection("schoolData").get()
        ]).then(([schoolsSnap, subSnap, usersSnap, dataSnap]) => {
          if (schoolsSnap.exists && schoolsSnap.data().list?.length)
            setSchools(schoolsSnap.data().list);
          if (subSnap.exists && subSnap.data().list?.length)
            setSubjects(subSnap.data().list);
          if (usersSnap.exists && usersSnap.data().list?.length)
            setUsers(usersSnap.data().list);
          if (!dataSnap.empty) {
            const loaded = {};
            dataSnap.forEach(doc => { loaded[doc.id] = doc.data(); });
            setSchoolData(prev => ({ ...prev, ...loaded }));
          }
          setReady(true);
          document.getElementById("fb-loading").style.display = "none";
        }).catch(() => {
          setReady(true);
          document.getElementById("fb-loading").style.display = "none";
        });
      }, []);
      return { schools, setSchools, schoolData, setSchoolData, subjects, setSubjects, users, setUsers, ready };
    }

// ─── App Component ────────────────────────────────────────────────────────
function App() {
  const [user, setUser] = useState(null);
  const [schools, setSchools] = useState(INITIAL_SCHOOLS);
  const [schoolData, setSchoolData] = useState(INITIAL_SCHOOL_DATA);
  const [page, setPage] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [selectedSchoolId, setSelectedSchoolId] = useState(null);
  const [dataTab, setDataTab] = useState("strength");
  const [subjects, setSubjects] = useState(DEFAULT_SUBJECTS);
  const [users, setUsers] = useState(USERS);

  const login = (username, password) => {
    const u = users.find(x => x.username === username && x.password === password);
    if (u) { setUser(u); setPage("dashboard"); return true; }
    return false;
  };

  const updateUserPassword = (userId, newPassword) => {
    setUsers(prev => prev.map(u => u.id === userId ? { ...u, password: newPassword } : u));
  };

  const logout = () => { setUser(null); setPage("dashboard"); };

  const updateSchoolProfile = (id, updates) => {
    setSchools(prev => prev.map(s => s.id === id ? { ...s, ...updates } : s));
  };

  const updateData = (schoolId, field, value) => {
    setSchoolData(prev => ({
      ...prev,
      [schoolId]: { ...prev[schoolId], [field]: value }
    }));
  };

  const submitData = (schoolId) => {
    setSchoolData(prev => ({
      ...prev,
      [schoolId]: { ...prev[schoolId], status: "submitted", submittedAt: new Date().toISOString() }
    }));
  };

  const approveData = (schoolId) => {
    setSchoolData(prev => ({
      ...prev,
      [schoolId]: { ...prev[schoolId], status: "approved" }
    }));
  };

  const lockData = (schoolId) => {
    setSchoolData(prev => ({
      ...prev,
      [schoolId]: { ...prev[schoolId], status: "locked", lockedAt: new Date().toISOString() }
    }));
  };

  const unlockData = (schoolId) => {
    setSchoolData(prev => ({
      ...prev,
      [schoolId]: { ...prev[schoolId], status: "approved", lockedAt: null }
    }));
  };

  const addSchool = (school) => {
    const id = schools.length + 1;
    setSchools(prev => [...prev, { ...school, id }]);
    setSchoolData(prev => ({ ...prev, [id]: makeSchoolData(id) }));
  };

  const deleteSchool = (id) => {
    if (!window.confirm("ഈ സ്കൂൾ നീക്കം ചെയ്യണോ?")) return;
    setSchools(prev => prev.filter(s => s.id !== id));
    setSchoolData(prev => { const n = { ...prev }; delete n[id]; return n; });
  };

  if (!user) return <LoginScreen onLogin={login} />;

  const mySchoolId = user.role === "school" ? user.schoolId : (selectedSchoolId || schools[0]?.id);
  const mySchool = schools.find(s => s.id === mySchoolId);
  const myData = schoolData[mySchoolId] || makeSchoolData(mySchoolId);
  const isLocked = myData.status === "locked";

  return (
    <>
      <style dangerouslySetInnerHTML={{ __html: css }} />
      <div className="app-shell">
        <Sidebar user={user} page={page} setPage={setPage} sidebarOpen={sidebarOpen} onLogout={logout} onToggle={() => setSidebarOpen(o => !o)} />
        <div className={`main-content ${sidebarOpen ? "" : "full"}`}>
          <div className="district-banner">
            <img src={LOGO_BASE64} alt="BVN Kerala" className="banner-logo" />
            <div className="banner-text">
              <h2>Bharatheeya Vidya Niketan – Kollam District</h2>
              <p>School Information Management System</p>
            </div>
            <span className="banner-year">2026–27</span>
          </div>
          <Topbar title={pageTitle(page)} onToggle={() => setSidebarOpen(o => !o)} user={user} />
          <div className="page">
            {page === "dashboard" && (
              user.role === "admin"
                ? <AdminDashboard schools={schools} schoolData={schoolData} />
                : <SchoolDashboard school={mySchool} data={myData} />
            )}
            {page === "schools" && user.role === "admin" && (
              <SchoolsPage schools={schools} schoolData={schoolData}
                onSelect={(id) => { setSelectedSchoolId(id); setPage("data-entry"); }}
                onAdd={addSchool}
                onDelete={deleteSchool}
                onApprove={approveData} onLock={lockData} onUnlock={unlockData}
              />
            )}
            {/* School users blocked from district pages */}
            {page === "schools" && user.role === "school" && (
              <div className="alert alert-danger">🚫 ഈ പേജ് കാണാൻ അനുമതിയില്ല.</div>
            )}
            {page === "users" && user.role === "school" && (
              <div className="alert alert-danger">🚫 ഈ പേജ് കാണാൻ അനുമതിയില്ല.</div>
            )}
            {page === "profile" && (
              <ProfilePage school={mySchool} onSave={(u) => updateSchoolProfile(mySchoolId, u)} readOnly={user.role === "school" ? isLocked : false} />
            )}
            {page === "data-entry" && (
              <DataEntryPage
                school={mySchool} data={myData}
                onUpdate={(f, v) => updateData(mySchoolId, f, v)}
                onSubmit={() => submitData(mySchoolId)}
                locked={isLocked}
                tab={dataTab} setTab={setDataTab}
              />
            )}
            {page === "reports" && (
              <ReportsPage
                schools={user.role === "school" ? schools.filter(s => s.id === user.schoolId) : schools}
                schoolData={schoolData}
                selectedId={user.role === "school" ? user.schoolId : null}
                isSchoolUser={user.role === "school"}
              />
            )}
            {page === "users" && user.role === "admin" && (
              <UsersPage schools={schools} users={users} onUpdatePassword={updateUserPassword} />
            )}
            {page === "teachers" && user.role === "school" && (
              <TeachersPage data={myData} subjects={subjects}
                onUpdate={(f,v) => updateData(mySchoolId, f, v)} />
            )}
            {page === "samithi" && user.role === "school" && (
              <SamithiPage data={myData}
                onUpdate={(f,v) => updateData(mySchoolId, f, v)} />
            )}
            {page === "subjects" && user.role === "admin" && (
              <SubjectsPage subjects={subjects} onSave={(s) => setSubjects(s)} />
            )}
            {page === "teacher-reports" && user.role === "admin" && (
              <TeacherReportsPage schools={schools} schoolData={schoolData} subjects={subjects} />

}

// ─── Admin Dashboard ──────────────────────────────────────────────────────
function AdminDashboard({ schools, schoolData }) {
  const allData = Object.values(schoolData);
  const totalStudents = allData.reduce((s, d) => s + sumStrength(d.strength).total, 0);
  const totalBoys = allData.reduce((s, d) => s + sumStrength(d.strength).boys, 0);
  const totalGirls = allData.reduce((s, d) => s + sumStrength(d.strength).girls, 0);
  const totalTeachers = allData.reduce((s, d) => s + Number(d.staff.maleteachers || 0) + Number(d.staff.femaleteachers || 0), 0);
  const totalNT = allData.reduce((s, d) => s + Number(d.staff.officestaff || 0) + Number(d.staff.ayah || 0) + Number(d.staff.librarian || 0) + Number(d.staff.accountant || 0) + Number(d.staff.otherstaff || 0), 0);
  const totalAdmissions = allData.reduce((s, d) => {
    let t = 0; CLASSES.forEach(c => { t += Number(d.admissions[c]?.boys || 0) + Number(d.admissions[c]?.girls || 0); });
    return s + t;
  }, 0);
  const totalSC = allData.reduce((s, d) => s + Number(d.community.SC || 0), 0);
  const totalST = allData.reduce((s, d) => s + Number(d.community.ST || 0), 0);
  const totalOBC = allData.reduce((s, d) => s + Number(d.community.OBC || 0), 0);
  const totalOEC = allData.reduce((s, d) => s + Number(d.community.OEC || 0), 0);
  const totalGeneral = allData.reduce((s, d) => s + Number(d.community.General || 0), 0);

  const submitted = allData.filter(d => ["submitted","approved","locked"].includes(d.status)).length;

  const schoolStrengths = schools.map(s => ({ name: s.name.split(" ").slice(0, 3).join(" "), val: sumStrength(schoolData[s.id]?.strength || makeStudentStrength()).total }));
  const maxVal = Math.max(...schoolStrengths.map(x => x.val), 1);

  return (
    <>
      <div className="alert alert-info">
        📌 <strong>{submitted} of {schools.length} schools</strong> have submitted data for 2026–27.
      </div>

      {/* Local Body Summary Stats */}
      <LocalBodySummaryCards schools={schools} schoolData={schoolData} />

      <div className="stats-grid">
        <StatCard icon="🏫" color="orange" label="Total Schools" value={fmtNum(schools.length)} />
        <StatCard icon="👨‍🎓" color="blue" label="Total Students" value={fmtNum(totalStudents)} sub={`${fmtNum(totalBoys)} Boys · ${fmtNum(totalGirls)} Girls`} />
        <StatCard icon="👦" color="blue" label="Total Boys" value={fmtNum(totalBoys)} />
        <StatCard icon="👧" color="purple" label="Total Girls" value={fmtNum(totalGirls)} />
        <StatCard icon="👩‍🏫" color="green" label="Total Teachers" value={fmtNum(totalTeachers)} />
        <StatCard icon="👷" color="amber" label="Non-Teaching Staff" value={fmtNum(totalNT)} />
        <StatCard icon="🆕" color="orange" label="New Admissions" value={fmtNum(totalAdmissions)} />
        <StatCard icon="📋" color="green" label="SC Students" value={fmtNum(totalSC)} />
        <StatCard icon="🌿" color="green" label="ST Students" value={fmtNum(totalST)} />
        <StatCard icon="🔵" color="blue" label="OBC Students" value={fmtNum(totalOBC)} />
        <StatCard icon="🟡" color="amber" label="OEC Students" value={fmtNum(totalOEC)} />
        <StatCard icon="⚪" color="red" label="General Students" value={fmtNum(totalGeneral)} />
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-title"><span className="icon">📊</span>School-wise Student Strength</div>
          <div className="bar-chart">
            {schoolStrengths.map((s, i) => (
              <div className="bar-row" key={i}>
                <div className="bar-label" title={s.name}>{s.name}</div>
                <div className="bar-track">
                  <div className="bar-fill" style={{ width: `${(s.val / maxVal) * 100}%` }}>
                    {s.val > 0 && <span>{s.val}</span>}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="card">
          <div className="card-title"><span className="icon">📝</span>Submission Status</div>
          <div className="table-wrap">
            <table>
              <thead><tr><th>School</th><th>Status</th><th>Students</th></tr></thead>
              <tbody>
                {schools.map(s => {
                  const d = schoolData[s.id];
                  return (
                    <tr key={s.id}>
                      <td style={{ fontSize: 13 }}>{s.name.split(" ").slice(0, 4).join(" ")}</td>
                      <td><StatusBadge status={d?.status || "draft"} /></td>
                      <td><strong>{fmtNum(sumStrength(d?.strength || makeStudentStrength()).total)}</strong></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <div style={{ marginTop: 20 }} className="card">
        <div className="card-title"><span className="icon">🏛️</span>Taluk-wise Summary</div>
        <TalukSummary schools={schools} schoolData={schoolData} />
      </div>
    </>
  );
}

function LocalBodySummaryCards({ schools, schoolData }) {
  const types = ["Grama Panchayat", "Municipality", "Corporation"];
  const summary = types.map(type => {
    const typeSchools = schools.filter(s => (s.localBodyType || "Grama Panchayat") === type);
    const uniqueBodies = [...new Set(typeSchools.map(s => s.localBody).filter(Boolean))];
    const students = typeSchools.reduce((a, s) => a + sumStrength(schoolData[s.id]?.strength || makeStudentStrength()).total, 0);
    const taluks = [...new Set(typeSchools.map(s => s.taluk).filter(Boolean))];
    return { type, count: typeSchools.length, bodies: uniqueBodies, students, taluks };
  });

  const icons = { "Grama Panchayat": "🌾", "Municipality": "🏘️", "Corporation": "🏙️" };
  const colors = { "Grama Panchayat": COLORS.secondary, "Municipality": "#1D4ED8", "Corporation": "#7C3AED" };
  const bgColors = { "Grama Panchayat": "rgba(26,107,58,0.08)", "Municipality": "rgba(29,78,216,0.08)", "Corporation": "rgba(124,58,237,0.08)" };

  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16, marginBottom: 20 }}>
      {summary.map(s => (
        <div key={s.type} style={{ background: "#fff", border: `1px solid ${COLORS.border}`, borderRadius: 12, padding: 18, borderTop: `4px solid ${colors[s.type]}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
            <span style={{ fontSize: 24 }}>{icons[s.type]}</span>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, color: colors[s.type] }}>{s.type}</div>
              <div style={{ fontSize: 12, color: COLORS.textMuted }}>{s.bodies.length} local bodies · {s.count} schools</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 16, marginBottom: 10 }}>
            <div style={{ background: bgColors[s.type], borderRadius: 8, padding: "6px 12px", flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted }}>Schools</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: colors[s.type] }}>{s.count}</div>
            </div>
            <div style={{ background: bgColors[s.type], borderRadius: 8, padding: "6px 12px", flex: 1, textAlign: "center" }}>
              <div style={{ fontSize: 11, color: COLORS.textMuted }}>Students</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: colors[s.type] }}>{fmtNum(s.students)}</div>
            </div>
          </div>
          {s.bodies.length > 0 && (
            <div style={{ fontSize: 12, color: COLORS.textMuted }}>
              <strong style={{ color: COLORS.text }}>Local Bodies: </strong>
              {s.bodies.join(" · ")}
            </div>
          )}
          {s.taluks.length > 0 && (
            <div style={{ fontSize: 12, color: COLORS.textMuted, marginTop: 4 }}>
              <strong style={{ color: COLORS.text }}>Taluks: </strong>
              {s.taluks.join(", ")}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── TalukSummary ─────────────────────────────────────────────────────────
function TalukSummary({ schools, schoolData }) {
  const taluks = {};
  schools.forEach(s => {
    const t = s.taluk || "Unknown";
    if (!taluks[t]) taluks[t] = { schools: 0, students: 0, boys: 0, girls: 0 };
    taluks[t].schools++;
    const st = sumStrength(schoolData[s.id]?.strength || makeStudentStrength());
    taluks[t].students += st.total;
    taluks[t].boys += st.boys;
    taluks[t].girls += st.girls;
  });
  return (
    <div className="table-wrap">
      <table>
        <thead><tr><th>Taluk</th><th>Schools</th><th>Boys</th><th>Girls</th><th>Total Students</th></tr></thead>
        <tbody>
          {Object.entries(taluks).map(([t, v]) => (
            <tr key={t}>
              <td><strong>{t}</strong></td>
              <td>{v.schools}</td>
              <td>{fmtNum(v.boys)}</td>
              <td>{fmtNum(v.girls)}</td>
              <td><strong>{fmtNum(v.students)}</strong></td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ─── School Dashboard ─────────────────────────────────────────────────────
function SchoolDashboard({ school, data }) {
  if (!school) return <div className="alert alert-warning">⚠️ School not found.</div>;
  const st = sumStrength(data.strength);
  const totalTeachers = Number(data.staff.maleteachers || 0) + Number(data.staff.femaleteachers || 0);
  const prev = Number(data.prevYearTotal || 0);
  const diff = st.total - prev;
  const growthPct = prev > 0 ? ((diff / prev) * 100).toFixed(1) : 0;

  return (
    <>
      <div className="card" style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <div style={{ width: 56, height: 56, borderRadius: 12, background: COLORS.primary, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24 }}>🏫</div>
          <div>
            <h2 style={{ fontSize: 18, fontWeight: 700 }}>{school.name}</h2>
            <p style={{ fontSize: 13, color: COLORS.textMuted }}>{school.code} · {school.level} · {school.place}</p>
          </div>
          <div style={{ marginLeft: "auto" }}><StatusBadge status={data.status} /></div>
        </div>
      </div>

      <div className="stats-grid">
        <StatCard icon="👨‍🎓" color="blue" label="Total Students" value={fmtNum(st.total)} sub={`${fmtNum(st.boys)} B · ${fmtNum(st.girls)} G`} />
        <StatCard icon="👩‍🏫" color="green" label="Total Teachers" value={fmtNum(totalTeachers)} />
        <StatCard icon="📈" color={diff >= 0 ? "green" : "red"} label="Growth vs Last Year" value={`${diff >= 0 ? "+" : ""}${fmtNum(diff)}`} sub={`${growthPct}% vs 2025-26`} />
        <StatCard icon="📝" color="orange" label="Submission Status" value={data.status.charAt(0).toUpperCase() + data.status.slice(1)} />
      </div>

      <div className="grid-2">
        <div className="card">
          <div className="card-title">📊 Community Distribution</div>
          {["SC", "ST", "OBC", "OEC", "General"].map((c, i) => {
            const v = Number(data.community[c] || 0);
            const pct = st.total > 0 ? Math.round((v / st.total) * 100) : 0;
            const colors = ["orange","green","blue","amber","red"];
            return (
              <div className="bar-row" key={c} style={{ marginBottom: 8 }}>
                <div className="bar-label">{c}</div>
                <div className="bar-track">
                  <div className={`bar-fill ${colors[i % colors.length]}`} style={{ width: `${pct}%`, background: [COLORS.primary, COLORS.secondary, "#2563EB", COLORS.accent, "#9333EA"][i] }}>
                    {pct > 5 && <span>{pct}%</span>}
                  </div>
                </div>
                <span style={{ fontSize: 12, color: COLORS.textMuted, width: 32, textAlign: "right" }}>{v}</span>
              </div>
            );
          })}
        </div>
        <div className="card">
          <div className="card-title">🏷️ School Details</div>
          <table style={{ width: "100%", fontSize: 13 }}>
            <tbody>
              {[["Local Body Type", school.localBodyType || "Grama Panchayat"],["Local Body", school.localBody || school.panchayat || "—"],["Taluk", school.taluk],["Headmaster", school.headmaster],["Establishment", school.estYear],["UDISE", school.udise || "—"],["Email", school.email || "—"]].map(([k, v]) => (
                <tr key={k}><td style={{ color: COLORS.textMuted, padding: "6px 0", width: 130 }}>{k}</td><td style={{ fontWeight: 500 }}>{v}</td></tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </>
  );
}

// ─── Data Entry ───────────────────────────────────────────────────────────
function DataEntryPage({ school, data, onUpdate, onSubmit, locked, tab, setTab }) {
  const [saveMsg, setSaveMsg] = useState("");
  if (!school) return <div className="alert alert-warning">School not found.</div>;

  const st = sumStrength(data.strength);
  const communityTotal = Object.values(data.community).reduce((a, v) => a + Number(v || 0), 0);
  const communityMatch = communityTotal === st.total;

  const handleUpdate = (field, value) => {
    onUpdate(field, value);
    setSaveMsg("✅ ഡേറ്റ സേവ് ആയി!");
    setTimeout(() => setSaveMsg(""), 2500);
  };

  const handleSubmit = () => {
    if (!communityMatch && st.total > 0) { alert("Community total does not match student strength!"); return; }
    if (window.confirm("Submit data for 2026–27? You cannot edit after submission.")) onSubmit();
  };

  return (
    <>
      <div className="card" style={{ marginBottom: 20, display: "flex", alignItems: "center", gap: 16 }}>
        <div>
          <h2 style={{ fontSize: 17, fontWeight: 700 }}>{school.name}</h2>
          <p style={{ fontSize: 13, color: COLORS.textMuted }}>Academic Year: 2026–27 · {school.code}</p>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
          <StatusBadge status={data.status} />
          {!locked && data.status !== "submitted" && data.status !== "approved" && (
            <button className="btn btn-primary" onClick={handleSubmit}>📤 Submit Data</button>
          )}
          {locked && <span style={{ fontSize: 13, color: COLORS.textMuted }}>🔒 Locked</span>}
        </div>
      </div>

      {locked && <div className="alert alert-info">🔒 This data has been locked by the District Administrator. Contact admin for changes.</div>}

      <div className="tabs">
        {[["strength","📚 Student Strength"],["community","🏷️ Community"],["admissions","🆕 Admissions"],["staff","👩‍🏫 Staff"],["growth","📈 Growth"]].map(([k, label]) => (
          <div key={k} className={`tab ${tab === k ? "active" : ""}`} onClick={() => setTab(k)}>{label}</div>
        ))}
      </div>

      {saveMsg && (
        <div style={{ position: "fixed", bottom: 24, right: 24, background: "#166534", color: "#fff", padding: "12px 20px", borderRadius: 10, fontWeight: 600, fontSize: 14, zIndex: 999, boxShadow: "0 4px 16px rgba(0,0,0,0.2)" }}>
          {saveMsg}
        </div>
      )}
      <div className={locked ? "submitted-overlay" : ""}>
        {tab === "strength" && <StrengthTab strength={data.strength} onUpdate={s => handleUpdate("strength", s)} />}
        {tab === "community" && <CommunityTab community={data.community} total={st.total} onUpdate={c => handleUpdate("community", c)} />}
        {tab === "admissions" && <AdmissionsTab admissions={data.admissions} onUpdate={a => handleUpdate("admissions", a)} />}
        {tab === "staff" && <StaffTab staff={data.staff} onUpdate={s => handleUpdate("staff", s)} />}
        {tab === "growth" && <GrowthTab current={st.total} prev={data.prevYearTotal} prevNewAdmissions={data.prevYearNewAdmissions} onUpdate={(field, val) => handleUpdate(field, val)} />}
      </div>
    </>
  );
}

function StrengthTab({ strength, onUpdate }) {
  const set = (cls, gender, val) => {
    onUpdate({ ...strength, [cls]: { ...strength[cls], [gender]: Number(val) || 0 } });
  };
  const st = sumStrength(strength);

  return (
    <div className="card">
      <div className="card-title">📚 Class-wise Student Strength</div>
      <div className="table-wrap">
        <table className="class-strength-table">
          <thead>
            <tr><th>Class</th><th>Boys</th><th>Girls</th><th>Total</th></tr>
          </thead>
          <tbody>
            {CLASSES.map(c => {
              const b = Number(strength[c]?.boys || 0), g = Number(strength[c]?.girls || 0);
              return (
                <tr key={c}>
                  <td><strong style={{ color: COLORS.text, fontSize: 14 }}>{c}</strong></td>
                  <td><input type="number" min="0" className="num-input" value={b || ""} onChange={e => set(c, "boys", e.target.value)} placeholder="0" /></td>
                  <td><input type="number" min="0" className="num-input" value={g || ""} onChange={e => set(c, "girls", e.target.value)} placeholder="0" /></td>
                  <td><strong style={{ color: b + g > 0 ? COLORS.secondary : COLORS.textMuted }}>{b + g}</strong></td>
                </tr>
              );
            })}
            <tr className="total-row">
              <td><strong style={{ color: COLORS.secondary }}>TOTAL</strong></td>
              <td><strong style={{ color: COLORS.primary }}>{fmtNum(st.boys)}</strong></td>
              <td><strong style={{ color: COLORS.primary }}>{fmtNum(st.girls)}</strong></td>
              <td><strong style={{ color: COLORS.primary, fontSize: 16 }}>{fmtNum(st.total)}</strong></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

function CommunityTab({ community, total, onUpdate }) {
  const set = (k, v) => onUpdate({ ...community, [k]: Number(v) || 0 });
  const catTotal = Object.values(community).reduce((a, v) => a + Number(v || 0), 0);
  const diff = total - catTotal;
  const ok = diff === 0 || total === 0;

  return (
    <div className="card">
      <div className="card-title">🏷️ Community / Category</div>
      {!ok && <div className="alert alert-warning">⚠️ Category total ({fmtNum(catTotal)}) differs from student strength ({fmtNum(total)}) by {Math.abs(diff)}</div>}
      {ok && total > 0 && <div className="alert alert-success">✅ Category total matches student strength.</div>}
      <div className="form-grid">
        {["SC","ST","OBC","OEC","General"].map(c => (
          <div className="form-group" key={c}>
            <label>{c}</label>
            <input type="number" min="0" className="form-control" value={community[c] || ""} onChange={e => set(c, e.target.value)} placeholder="0" />
          </div>
        ))}
      </div>
      <div style={{ marginTop: 16, padding: "12px 16px", background: COLORS.bg, borderRadius: 8, display: "flex", gap: 16 }}>
        <span style={{ fontSize: 14 }}>Category Total: <strong>{fmtNum(catTotal)}</strong></span>
        <span style={{ fontSize: 14 }}>Student Strength: <strong>{fmtNum(total)}</strong></span>
        <span style={{ fontSize: 14, color: ok ? COLORS.success : COLORS.danger, fontWeight: 600 }}>{ok ? "✓ Match" : `✗ Difference: ${Math.abs(diff)}`}</span>
      </div>
    </div>
  );
}

function AdmissionsTab({ admissions, onUpdate }) {
  const set = (cls, gender, val) => {
    onUpdate({ ...admissions, [cls]: { ...admissions[cls], [gender]: Number(val) || 0 } });
  };
  let totalB = 0, totalG = 0;
  CLASSES.forEach(c => { totalB += Number(admissions[c]?.boys || 0); totalG += Number(admissions[c]?.girls || 0); });

  return (
    <div className="card">
      <div className="card-title">🆕 New Admissions 2026–27</div>
      <div className="table-wrap">
        <table className="class-strength-table">
          <thead><tr><th>Class</th><th>New Boys</th><th>New Girls</th><th>Total</th></tr></thead>
          <tbody>
            {CLASSES.map(c => {
              const b = Number(admissions[c]?.boys || 0), g = Number(admissions[c]?.girls || 0);
              return (
                <tr key={c}>
                  <td><strong style={{ color: COLORS.text, fontSize: 14 }}>{c}</strong></td>
                  <td><input type="number" min="0" className="num-input" value={b || ""} onChange={e => set(c, "boys", e.target.value)} placeholder="0" /></td>
                  <td><input type="number" min="0" className="num-input" value={g || ""} onChange={e => set(c, "girls", e.target.value)} placeholder="0" /></td>
                  <td><strong style={{ color: b + g > 0 ? COLORS.secondary : COLORS.textMuted }}>{b + g}</strong></td>
                </tr>
              );
            })}
            <tr className="total-row">
              <td>TOTAL ADMISSIONS</td>
              <td><strong style={{ color: COLORS.primary }}>{fmtNum(totalB)}</strong></td>
              <td><strong style={{ color: COLORS.primary }}>{fmtNum(totalG)}</strong></td>
              <td><strong style={{ color: COLORS.primary, fontSize: 16 }}>{fmtNum(totalB + totalG)}</strong></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}

  const set = (k, v) => onUpdate({ ...staff, [k]: Number(v) || 0 });
  const totalT = Number(staff.maleteachers || 0) + Number(staff.femaleteachers || 0);
  const trainedTotal = Number(staff.trained || 0) + Number(staff.untrained || 0);
  const trainedOk = trainedTotal === totalT || totalT === 0;
  const totalNT = Number(staff.officestaff || 0) + Number(staff.otherstaff || 0) + Number(staff.busstaff || 0) + Number(staff.ayah || 0);

  return (
    <>
      <div className="card" style={{ marginBottom: 16 }}>

          <div className="form-group"><label>Female Teachers</label><input type="number" min="0" className="form-control" value={staff.femaleteachers || ""} onChange={e => set("femaleteachers", e.target.value)} placeholder="0" /></div>

          <div className="form-group"><label>Trained Teachers</label><input type="number" min="0" className="form-control" value={staff.trained || ""} onChange={e => set("trained", e.target.value)} placeholder="0" /></div>
          <div className="form-group"><label>Untrained Teachers</label><input type="number" min="0" className="form-control" value={staff.untrained || ""} onChange={e => set("untrained", e.target.value)} placeholder="0" /></div>
        </div>
      </div>

      <div className="card">
        <div className="card-title">👷 Non-Teaching Staff</div>
        <div className="form-grid">
          {[["officestaff","Office Staff
